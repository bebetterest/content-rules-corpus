%E2%80%99t%20allow%20bullying%2C%20even%20in%20retaliation.%20Bullying%20can%20take%20many%20forms%2C%20including%3A%3C%2Fp%3E%3Cul%3E%3Cli%3EContent%20that%20degrades%2C%20mocks%2C%20or%20attacks%20a%20specific%20person.%3C%2Fli%3E%3Cli%3EPromoting%20coordinated%20abuse%2C%20such%20as%20encouraging%20others%20to%20leave%20abusive%20comments%20or%20falsely%20report%20an%20account.%3C%2Fli%3E%3Cli%3EPosting%20or%20threatening%20to%20post%20personal%20information%20about%20someone%20online%20with%20the%20intent%20to%20cause%20harm%20(doxing).%20We%20recognize%20intent%20can%20be%20subjective%2C%20so%20we%20use%20indicators%20to%20help%20us%20understand%20it%2C%20such%20as%20captions%20and%20hashtags.%3C%2Fli%3E%3Cli%3EDoing%20or%20saying%20things%20online%20that%20make%20someone%20feel%20uncomfortable%20or%20singled%20out%20in%20a%20sexual%20way%20(sexual%20harassment).%20This%20can%20include%3A%3C%2Fli%3E%3Cul%3E%3Cli%3EUsing%20sexual%20emojis%20or%20jokes%20toward%20someone%3C%2Fli%3E%3Cli%3EMaking%20comments%20about%20their%20intimate%20body%20parts%3C%2Fli%3E%3Cli%3EAdding%20sexual%20gestures%20or%20sounds%20to%20their%20videos%20or%20posts%3C%2Fli%3E%3Cli%3EMaliciously%20revealing%20personal%20info%20about%20their%20sex%20life%2C%20like%20their%20past%20partners%20or%20sexual%20orientation%3C%2Fli%3E%3C%2Ful%3E%3C%2Ful%3E%3Cp%3E%3Cbr%3EContent%20with%20lower-severity%20degrading%20behavior%20%3Ca%20href%3D%5C%22https%3A%2F%2Fwww.tiktok.com%2Fcommunity-guidelines%2Fen%2Fsafety-civility%237%5C%22%20target%3D%5C%22_blank%5C%22%20rel%3D%5C%22nofollow%20noreferrer%5C%22%20class%3D%5C%22syl-link%5C%22%20data-anchor-id%3D%5C%22%5C%22%3Emay%20not%20be%20eligible%20for%20the%20For%20You%20feed%3C%2Fa%3E.%20Sometimes%2C%20we%20may%20remove%20this%20content%20if%20we%20have%20more%20context%2C%20such%20as%20when%20it%20targets%20someone%20under%2018%20and%20could%20lead%20to%20greater%20harm.%20If%20you%20think%20a%20post%20or%20an%20account%20violates%20our%20%3Ca%20href%3D%5C%22https%3A%2F%2Fwww.tiktok.com%2Fcommunity-guidelines%2Fen%2Foverview%5C%22%20target%3D%5C%22_blank%5C%22%20rel%3D%5C%22nofollow%20noreferrer%5C%22%20class%3D%5C%22syl-link%5C%22%20data-anchor-id%3D%5C%22%5C%22%3ECommunity%20Guidelines%3C%2Fa%3E%2C%20you%20can%20report%20it%20to%20us.%3C%2Fp%3E%3Ch4%20level%3D%5C%224%5C%22%20id%3D%5C%22%5C%22%20align%3D%5C%22%5C%22%3EDid%20you%20know%3F%3C%2Fh4%3E%3Cul%3E%3Cli%20style%3D%5C%22text-align%3A%20left%3B%5C%22%3EBullying%20affects%20everyone%20involved%20in%20the%20situation%2C%20including%20the%20person%20bullying%2C%20the%20person%20being%20bullied%2C%20and%20those%20who%20witness%20it.%3C%2Fli%3E%3Cli%3EBullying%20can%20affect%20all%20types%20of%20people%2C%20including%20children%2C%20young%20adults%2C%20and%20public%20figures.%3C%2Fli%3E%3Cli%20style%3D%5C%22text-align%3A%20left%3B%5C%22%3EBystanders%20are%20people%20who%20may%20see%20bullying%20happen.%20They%20can%20play%20an%20important%20role%20in%20preventing%20bullying%20behavior.%3C%2Fli%3E%3Cli%20style%3D%5C%22text-align%3A%20left%3B%5C%22%3EIt's%20common%20for%20people%20to%20be%20bullied%20by%20those%20they%20know%2C%20such%20as%20a%20classmate%2C%20friend%2C%20or%20coworker.%3C%2Fli%3E%3Cli%20style%3D%5C%22text-align%3A%20left%3B%5C%22%3EBullying%20can%20occur%20almost%20anywhere%2C%20including%20schools%2C%20online%2C%20and%20at%20work.%3C%2Fli%3E%3Cli%3EPeople%20who%20are%20bullied%20can%20also%20bully%20others%20in%20order%20to%20feel%20powerful%20or%20in%20control.%3C%2Fli%3E%3C%2Ful%3E%3Ch3%20level%3D%5C%223%5C%22%20id%3D%5C%22%5C%22%20align%3D%5C%22%5C%22%3ECan%20I%20make%20negative%20comments%20about%20public%20figures%3F%3C%2Fh3%3E%3Cp%3EPublic%20figures%20are%20people%20who%20are%20at%20least%2018%20years%20old%20with%20a%20significant%20public%20role%2C%20such%20as%20a%20government%20official%20or%20celebrity.%20We%20recognize%20that%20public%20figures%20face%20greater%20attention%20and%20some%20content%20about%20them%20may%20serve%20the%20p attacks%20can%20harm%20the%20person%20targeted.%20Bullying%20can%20happen%20online%20or%20offline.%20Online%20bullying%20can%20spread%20quickly%20through%20sharing%20and%20visibility.%3C%2Fp%3E%3Ch3%20level%3D%5C%223%5C%22%20id%3D%5C%22%5C%22%20align%3D%5C%22%5C%22%3EHow%20to%20identify%20bullying%20and%20harassment%20on%20TikTok%3C%2Fh3%3E%3Cp%3EOn%20TikTok%2C%20we%20welcome%20respectful%20discussion%20and%20believe%20everyone%20should%20feel%20safe%20sharing%20their%20voice.%20We%20don't%20allow%20harassment%20or%20bullying%20on%20our%20platform.%20You%20can%20disagree%20with%20someone%E2%80%99s%20ideas%20or%20actions%20while%20treating%20them%20with%20respect.%20That%E2%80%99s%20why%20we%20don%E2%80%99t%20allow%20bullying%2C%20even%20in%20retaliation.%20Bullying%20can%20take%20many%20forms%2C%20including%3A%3C%2Fp%3E%3Cul%3E%3Cli%3EContent%20that%20degrades%2C%20mocks%2C%20or%20attacks%20a%20specific%20person.%3C%2Fli%3E%3Cli%3EPromoting%20coordinated%20abuse%2C%20such%20as%20encouraging%20others%20to%20leave%20abusive%20comments%20or%20falsely%20report%20an%20account.%3C%2Fli%3E%3Cli%3EPosting%20or%20threatening%20to%20post%20personal%20information%20about%20someone%20online%20with%20the%20intent%20to%20cause%20harm%20(doxing).%20We%20recognize%20intent%20can%20be%20subjective%2C%20so%20we%20use%20indicators%20to%20help%20us%20understand%20it%2C%20such%20as%20captions%20and%20hashtags.%3C%2Fli%3E%3Cli%3EDoing%20or%20saying%20things%20online%20that%20make%20someone%20feel%20uncomfortable%20or%20singled%20out%20in%20a%20sexual%20way%20(sexual%20harassment).%20This%20can%20include%3A%3C%2Fli%3E%3Cul%3E%3Cli%3EUsing%20sexual%20emojis%20or%20jokes%20toward%20someone%3C%2Fli%3E%3Cli%3EMaking%20comments%20about%20their%20intimate%20body%20parts%3C%2Fli%3E%3Cli%3EAdding%20sexual%20gestures%20or%20sounds%20to%20their%20videos%20or%20posts%3C%2Fli%3E%3Cli%3EMaliciously%20revealing%20personal%20info%20about%20their%20sex%20life%2C%20like%20their%20past%20partners%20or%20sexual%20orientation%3C%2Fli%3E%3C%2Ful%3E%3C%2Ful%3E%3Cp%3E%3Cbr%3EContent%20with%20lower-severity%20degrading%20behavior%20%3Ca%20href%3D%5C%22https%3A%2F%2Fwww.tiktok.com%2Fcommunity-guidelines%2Fen%2Fsafety-civility%237%5C%22%20target%3D%5C%22_blank%5C%22%20rel%3D%5C%22nofollow%20noreferrer%5C%22%20class%3D%5C%22syl-link%5C%22%20data-anchor-id%3D%5C%22%5C%22%3Emay%20not%20be%20eligible%20for%20the%20For%20You%20feed%3C%2Fa%3E.%20Sometimes%2C%20we%20may%20remove%20this%20content%20if%20we%20have%20more%20context%2C%20such%20as%20when%20it%20targets%20someone%20under%2018%20and%20could%20lead%20to%20greater%20harm.%20If%20you%20think%20a%20post%20or%20an%20account%20violates%20our%20%3Ca%20href%3D%5C%22https%3A%2F%2Fwww.tiktok.com%2Fcommunity-guidelines%2Fen%2Foverview%5C%22%20target%3D%5C%22_blank%5C%22%20rel%3D%5C%22nofollow%20noreferrer%5C%22%20class%3D%5C%22syl-link%5C%22%20data-anchor-id%3D%5C%22%5C%22%3ECommunity%20Guidelines%3C%2Fa%3E%2C%20you%20can%20report%20it%20to%20us.%3C%2Fp%3E%3Ch4%20level%3D%5C%224%5C%22%20id%3D%5C%22%5C%22%20align%3D%5C%22%5C%22%3EDid%20you%20know%3F%3C%2Fh4%3E%3Cul%3E%3Cli%20style%3D%5C%22text-align%3A%20left%3B%5C%22%3EBullying%20affects%20everyone%20involved%20in%20the%20situation%2C%20including%20the%20person%20bullying%2C%20the%20person%20being%20bullied%2C%20and%20those%20who%20witness%20it.%3C%2Fli%3E%3Cli%3EBullying%20can%20affect%20all%20types%20of%20people%2C%20including%20children%2C%20young%20adults%2C%20and%20public%20figures.%3C%2Fli%3E%3Cli%20style%3D%5C%22text-align%3A%20left%3B%5C%22%3EBystanders%20are%20people%20who%20may%20see%20bullying%20happen.%20They%20can%20play%20an%20important%20role%20in%20preventing%20bullying%20behavior.%3C%2Fli%3E%3Cli%20style%3D%5C%22text-align%3A%20left%3B%5C%22%3EIt's%20common%20for%20people%20to%20be%20bullied%20by%20those%20they%20know%2C%20such%20as%20a%20classmate%2C%20friend%2C%20or%20coworker.%3C%2Fli%3E%3Cli%20style%3D%5C%22text-align%3A%20left%3B%5C%22%3EBullying%20can%20occur%20almost%20anywhere%2C%20including%20schools%2C%20online%2C%20and%20at%20work.%3C%2Fli%3E%3Cli%3EPeople%20who%20are%20bullied%20can%20also%20bully%20others%20in%20order%20to%20feel%20powerful%20or%20in%20control.%3C%2Fli%3E%3C%2Ful%3E%3Ch3%20level%3D%5C%223%5C%22%20id%3D%5C%22%5C%22%20align%3D%5C%22%5C%22%3ECan%20I%20make%20negative%20comments%20about%20public%20figures%3F%3C%2Fh3%3E%3Cp%3EPublic%20figures%20are%20people%20who%20are%20at%20least%2018%20years%20old%20with%20a%20significant%20public%20role%2C%20such%20as%20a%20government%20official%20or%20celebrity.%20We%20recognize%20that%20public%20figures%20face%20greater%20attention%20and%20some%20content%20about%20them%20may%20serve%20the%20public%20interest.%20As%20a%20result%2C%20we%20allow%20more%20critical%20commentary%20about%20public%20figures%20than%20private%20figures.%20However%2C%20we%20still%20remove%20content%20that%20is%20most%20harmful%2C%20such%20as%20doxing%2C%20sexual%20harassment%2C%20or%20any%20other%20violation%20of%20our%20policies%2C%20including%20violent%20threats%2C%20hate%20speech%2C%20or%20sexual%20exploitation.%3C%2Fp%3E%22%2C%22image%22%3Anull%2C%22isHaveBorder%22%3Afalse%2C%22sys%22%3A%7B%22id%22%3A%22richText%2Fbullying-prevention-richtext-0-202401%22%7D%7D%2C%7B%22position%22%3A%22none%22%2C%22content%22%3A%22%3Ch3%20level%3D%5C%223%5C%22%20id%3D%5C%22%5C%22%20align%3D%5C%22left%5C%22%20style%3D%5C%22text-align%3Aleft%3B%5C%22%3EHow%20to%20prevent%20bullying%20on%20TikTok%3C%2Fh3%3E%3Cp%3EBystanders%20(people%20who%20witness%20bullying)%20can%20play%20an%20important%20role%20in%20stopping%20bullying%20behavior.%20If%20you%20ever%20feel%20someone%20is%20being%20harassed%20or%20otherwise%20behaving%20inappropriately%2C%20here%20are%20some%20partner%20resources%20that%20may%20help%3A%3C%2Fp%3E%22%2C%22image%22%3Anull%2C%22isHaveBorder%22%3Afalse%2C%22sys%22%3A%7B%22id%22%3A%22richText%2Fbullying-prevent-richtext-support-202401%22%7D%7D%2C%7B%22defaultText%22%3A%22%22%2C%22sys%22%3A%7B
